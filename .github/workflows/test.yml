name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        shell: bash
        # only-managed: the runners' preinstalled Pythons (python.org builds on
        # macOS) lack SQLite loadable-extension support, which sqlite-vec needs
        env:
          UV_PYTHON_PREFERENCE: only-managed
        run: |
          uv venv --python 3.12
          # Linux: use CPU-only torch wheels (the default CUDA build is huge)
          if [ "$RUNNER_OS" = "Linux" ]; then
            uv pip install torch --index-url https://download.pytorch.org/whl/cpu
          fi
          uv pip install -e ".[dev]"

      - name: Run tests
        shell: bash
        run: |
          if [ -f .venv/bin/python ]; then PY=.venv/bin/python; else PY=.venv/Scripts/python.exe; fi
          "$PY" -m pytest -q
